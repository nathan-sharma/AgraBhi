<!DOCTYPE html>
<html>
<head>
    <title>AgraBhi Data Hub</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
        .controls { margin-bottom: 20px; }
        button {
            padding: 10px 15px; margin: 5px; cursor: pointer;
            background: #444; color: white; border: 1px solid #666;
        }
        button:hover { background: #555; }
        .log-btn { background: #4169E1; }

        #console {
            background: #000;
            color: #0f0;
            padding: 15px;
            height: 200px;
            overflow-y: scroll;
            border: 2px solid #333;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-bottom: 20px;
        }

        #map { height: 500px; width: 100%; border-radius: 8px; border: 2px solid #333; }

        .error { color: #ff5252; }
        .success { color: #69f0ae; }
        .info { color: #40c4ff; }
        .warn { color: #ffd740; }
    </style>
    </head>
<body>

    <h1>AgraBhi Data Hub</h1>
    <p>Please see Mission Planner for telemetry data. The data hub is only for data collection >

    <div class="controls">
        <button onclick="collect()">Read Sensors</button>
        <button class="log-btn" onclick="logData()">Log Sensor Data</button>
        <button onclick="sendCmd('extend')">Extend Sensor</button>
        <button onclick="sendCmd('retract')">Retract Sensor</button>
    </div>

    <h3>System messages:</h3>
    <div id="console"></div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const consoleEl = document.getElementById("console");
        let logged_data_list = {{ initial_data | tojson | safe if initial_data is defined else >

        function addLog(msg, type='info') {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement("div");
            div.className = type;
            div.textContent = `[${time}] ${msg}`;
            consoleEl.prepend(div);
        }
        const map = L.map('map').setView(
            logged_data_list.length > 0 ? [logged_data_list[0][1], logged_data_list[0][2]] : [0>
            19
        );

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServ>
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        function getColor(m) {
            return m > 20 ? '#0000ff' :
                   m > 15 ? '#0077ff' :
                   m > 10 ? '#00ccff' :
                            '#ff4400';
        }

        // Draw the logged point on the map
        function drawMarker(point) {
            const [ID, lat, lon, moist] = point;
            L.circleMarker([lat, lon], {
                radius: 8,
                fillColor: getColor(moist),
                color: "#fff",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
            })
            .addTo(map)
            .bindPopup(`<strong>Moisture:</strong> ${moist}%<br><strong>Sample ID:</strong> ${I>
        }

        // Markers are drawn in case of reload
        logged_data_list.forEach(drawMarker);

        // Commands (buttons)
function logData() {
    addLog("Logging current data point...", "info");

    fetch('/log')
        .then(r => r.json())
        .then(data => {
            // Warnings
            if (data.status === "warning") {
                addLog(data.message, "warn");
                return; //code stops
            }

            if (data.status === "error") {
                addLog(data.message, "error");
                return; //code stops
            }

            //update map if log is successful
            logged_data_list = data["full_list"];

            const [ID, lat, lon, moist] = data.new_point;

            // Draw new point
            drawMarker(data.new_point);

            // Center map
            map.panTo([lat, lon]);

            addLog(`Success: Logged Sample ${ID}`, "success");
        })
        .catch(e => {
            console.error(e);
            addLog("Logging failed: " + e, "error");
        });
}
        function collect() {
            addLog("Requesting live sensor data...");
            fetch('/collect')
                            .then(r => r.json())
                .then(data => {
                    let msg = `READOUT: Lat ${data.lat}, Lon ${data.lon} | Moisture: ${data.moi>
                    let statusClass = isNaN(data.moisture) ? "warn" : "success";
                    addLog(msg, statusClass);
                })
                .catch(err => addLog("Collect failed: " + err, "error"));
        }

        function sendCmd(action) {
            addLog(`Sending ${action.toUpperCase()} command...`);
            fetch('/' + action)
                .then(r => r.text())
                .then(msg => {
                    const type = msg.includes("SUCCESS") ? "success" : "error";
                    addLog(msg, type);
                });
        }
    </script>
</body>
</html>
